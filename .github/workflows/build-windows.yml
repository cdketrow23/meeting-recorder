name: build-windows

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel
          pip install -r requirements.txt
          pip install pyinstaller==6.10.0

      - name: Build the one-file executable
        run: pyinstaller meetingrecorder.spec --noconfirm

      - name: Inspect the build
        run: |
          Get-Item dist\MeetingRecorder.exe
          Get-FileHash dist\MeetingRecorder.exe -Algorithm SHA256 | Format-List

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MeetingRecorder-windows
          path: |
            dist\MeetingRecorder.exe
            dist\MeetingRecorder.exe.sha256
          if-no-files-found: error

      - name: Attach to release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist\MeetingRecorder.exe
            dist\MeetingRecorder.exe.sha256

  test:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - run: python -m pytest -q tests/
